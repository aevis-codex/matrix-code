services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: matrix_code
      MYSQL_USER: matrixcode
      MYSQL_PASSWORD: matrixcode
      MYSQL_ROOT_PASSWORD: matrixcode-root
    ports:
      - "3306:3306"
    volumes:
      - matrixcode-mysql:/var/lib/mysql

  redis:
    image: redis:8
    ports:
      - "6379:6379"

volumes:
  matrixcode-mysql:
